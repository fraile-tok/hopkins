<body>
    <div id="main">
        <h1>Lodged</h1>
        <p id="author">Robert Frost</p>
        <hr>
        <div id="content">
            
                
                    <div class="stanza">
                        
                            
                                <p class="verse-line">The rain to the wind said,</p>
                            
                        
                            
                                <p class="verse-line">'You push and I'll pelt.'</p>
                            
                        
                            
                                <p class="verse-line">They so smote the garden bed</p>
                            
                        
                            
                                <p class="verse-line">That the flowers actually knelt,</p>
                            
                        
                            
                                <p class="verse-line">And lay lodged - though not dead.</p>
                            
                        
                            
                                <p class="verse-line">I know how the flowers felt.</p>
                            
                        
                    </div>
                
            
        </div>
