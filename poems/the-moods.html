    <div id="main">
        <h1>The Moods</h1>
        <p id="author">W.B. Yeats</p>
        <hr>
        <div id="content">
            
                
                    <div class="stanza">
                        
                            
                                <p class="verse-line">Time drops in decay,</p>
                            
                        
                            
                                <p class="verse-line">Like a candle burnt out,</p>
                            
                        
                            
                                <p class="verse-line">And the mountains and the woods</p>
                            
                        
                            
                                <p class="verse-line">Have their day, have their day;</p>
                            
                        
                            
                                <p class="verse-line">What one in the rout</p>
                            
                        
                            
                                <p class="verse-line">Of the fire-born moods</p>
                            
                        
                            
                                <p class="verse-line">Has fallen away?</p>
                            
                        
                    </div>
                
            
        </div>
