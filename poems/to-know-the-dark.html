        <h1>To Know the Dark</h1>
        <p id="author">Wendell Berry</p>
        <hr>
        <div id="content">
            
                
                    <div class="stanza">
                        
                            
                                <p class="verse-line">To go in the dark with a light is to know the light.</p>
                            
                        
                            
                                <p class="verse-line">To know the dark, go dark. Go without sight,</p>
                            
                        
                            
                                <p class="verse-line">and find that the dark, too, blooms and sings,</p>
                            
                        
                            
                                <p class="verse-line">and is traveled by dark feet and dark wings.</p>
                            
                        
                    </div>
