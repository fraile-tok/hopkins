        <h1>Vermeer</h1>
        <p id="author">Wisława Szymborska</p>
        <hr>
        <div id="content">
            
                
                    <div class="stanza">
                        
                            
                                <p class="verse-line">So long as the woman from Rijksmuseum</p>
                            
                        
                            
                                <p class="verse-line">in painted silence and concentration</p>
                            
                        
                            
                                <p class="verse-line">day after day pours milk</p>
                            
                        
                            
                                <p class="verse-line">from the jug to the bowl,</p>
                            
                        
                            
                                <p class="verse-line">the World does not deserve</p>
                            
                        
                            
                                <p class="verse-line">the end of the world.</p>
                            
                        
                    </div>
